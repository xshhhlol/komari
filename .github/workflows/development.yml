name: Development Environment

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-binaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #- name: Create dummy index.html
      #  run: |
      #    mkdir -p web/public/defaultTheme/dist
      #    echo "<html><body><h1>This is komari development server.</h1></body></html>" > web/public/defaultTheme/dist/index.html

      - name: Clone and build frontend
        run: |
          git clone https://github.com/xshhhlol/komari-web komari-web
          cd komari-web
          npm install
          npm run build
          cd ..
          mkdir -p web/public/defaultTheme/dist
          rm -rf web/public/defaultTheme/dist/*
          cp -r komari-web/dist/* web/public/defaultTheme/dist/
          cp -f komari-web/komari-theme.json web/public/defaultTheme/
          if [ -f komari-web/preview.png ]; then cp -f komari-web/preview.png web/public/defaultTheme/; fi
          if [ -f komari-web/perview.png ]; then cp -f komari-web/perview.png web/public/defaultTheme/; fi
          # Compatibility: ensure both filenames exist if only one is present
          if [ -f web/public/defaultTheme/preview.png ] && [ ! -f web/public/defaultTheme/perview.png ]; then cp -f web/public/defaultTheme/preview.png web/public/defaultTheme/perview.png; fi
          if [ -f web/public/defaultTheme/perview.png ] && [ ! -f web/public/defaultTheme/preview.png ]; then cp -f web/public/defaultTheme/perview.png web/public/defaultTheme/preview.png; fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build application
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION_SHA="${{ github.sha }}"
          go build -ldflags "-X github.com/komari-monitor/komari/utils.CurrentVersion=dev -X github.com/komari-monitor/komari/utils.VersionHash=${VERSION_SHA}" -o komari .

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: komari
          path: komari

  deploy-to-production:
    needs: build-binaries
    runs-on: ubuntu-latest
    env:
      PRODUCTION_SERVER: ${{ vars.PRODUCTION_SERVER }}
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: komari

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.PRODUCTION_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to production
        run: |
          chmod +x komari
          ssh root@${{ env.PRODUCTION_SERVER }} 'mkdir -p /opt/komari/'
          ssh root@${{ env.PRODUCTION_SERVER }} 'systemctl stop komari.service || true'
          ssh root@${{ env.PRODUCTION_SERVER }} 'rm -f /opt/komari/komari.old'
          ssh root@${{ env.PRODUCTION_SERVER }} 'mv /opt/komari/komari /opt/komari/komari.old || true'
          scp komari root@${{ env.PRODUCTION_SERVER }}:/opt/komari/komari
          ssh root@${{ env.PRODUCTION_SERVER }} 'systemctl start komari.service'
